spring.datasource.url=jdbc:h2:mem:hmsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Disable Flyway for H2 testing (or use a different location)
spring.flyway.enabled=false

app.jwt.secret=dev-secret-key-only-for-local-use-minimum-64-characters-long-ok
app.jwt.expiration-ms=9000000
