spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}  

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/hms_db?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:13090802}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

app.jwt.secret=${JWT_SECRET:dev-secret-key-only-for-local-minimum-64-characters-longgg}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.out-of-order=true
spring.flyway.ignore-migration-patterns=*:ignored