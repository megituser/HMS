<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HMS | Appointments</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body { background:#f4f7fb; font-family:"Segoe UI",system-ui; }
        .sidebar {
            width:260px; min-height:100vh;
            background:linear-gradient(135deg,#0d6efd,#0a58ca);
            color:white;
        }
        .sidebar a {
            display:block; padding:12px 20px;
            color:white; text-decoration:none;
        }
        .sidebar a:hover { background:rgba(255,255,255,.15); }
        .topbar {
            background:white; padding:15px 30px;
            border-bottom:1px solid #e3e6ea;
        }
        .content { padding:30px; }
    </style>
</head>

<body>
<div class="d-flex">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h4 class="p-3"><i class="bi bi-hospital"></i> HMS</h4>
        <a href="admin-dashboard.html">Dashboard</a>
        <a href="appointments.html">Appointments</a>
        <a href="patients.html">Patients</a>
        <a href="doctors.html">Doctors</a>
        <a href="#" onclick="logout()" class="text-warning mt-4">Logout</a>
    </div>

    <!-- MAIN -->
    <div class="flex-grow-1">

        <!-- TOP BAR -->
        <div class="topbar d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Appointments</h5>
            <button class="btn btn-primary" data-bs-toggle="modal"
                    data-bs-target="#appointmentModal">
                <i class="bi bi-plus-lg"></i> New Appointment
            </button>
        </div>

        <!-- CONTENT -->
        <div class="content">
            <table class="table table-bordered table-striped align-middle">
                <thead class="table-light">
                <tr>
                    <th>Patient</th>
                    <th>Doctor</th>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Status</th>
                    <th width="120">Actions</th>
                </tr>
                </thead>
                <tbody id="appointmentTable"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- ADD APPOINTMENT MODAL -->
<div class="modal fade" id="appointmentModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Create Appointment</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body row g-3">

                <div class="col-md-6">
                    <label class="form-label">Patient</label>
                    <select class="form-select" id="patientId"></select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Doctor</label>
                    <select class="form-select" id="doctorId"></select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Date</label>
                    <input type="date" class="form-control" id="appointmentDate">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Time</label>
                    <input type="time" class="form-control" id="appointmentTime">
                </div>

                <div class="col-md-12">
                    <label class="form-label">Notes</label>
                    <textarea class="form-control" id="notes"></textarea>
                </div>
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-primary" onclick="createAppointment()">Save</button>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
/* ================= AUTH ================= */
const token = localStorage.getItem("token");
if (!token) location.href = "index.html";

const headers = {
    "Content-Type": "application/json",
    "Authorization": "Bearer " + token
};

/* ================= LOAD APPOINTMENTS ================= */
function loadAppointments() {
    fetch("http://localhost:8080/api/appointments", { headers })
        .then(r => r.json())
        .then(data => {
            const t = document.getElementById("appointmentTable");
            t.innerHTML = "";

            data.forEach(a => {
                t.innerHTML += `
                    <tr>
                        <td>${a.patientName}</td>
                        <td>${a.doctorName}</td>
                        <td>${a.appointmentDate}</td>
                        <td>${a.appointmentTime}</td>
                        <td>
                            <span class="badge bg-${a.status === "BOOKED" ? "primary" : "secondary"}">
                                ${a.status}
                            </span>
                        </td>
                        <td>
                            <button class="btn btn-danger btn-sm"
                                    onclick="cancelAppointment(${a.id})">
                                Cancel
                            </button>
                        </td>
                    </tr>
                `;
            });
        });
}

loadAppointments();

/* ================= LOAD DROPDOWNS ================= */
fetch("http://localhost:8080/api/patients", { headers })
    .then(r => r.json())
    .then(p => {
        patientId.innerHTML = p.map(x =>
            `<option value="${x.id}">${x.firstName} ${x.lastName}</option>`
        ).join("");
    });

fetch("http://localhost:8080/api/doctors", { headers })
    .then(r => r.json())
    .then(d => {
        doctorId.innerHTML = d.map(x =>
            `<option value="${x.id}">${x.firstName} ${x.lastName}</option>`
        ).join("");
    });

/* ================= CREATE ================= */
function createAppointment() {
    fetch("http://localhost:8080/api/appointments", {
        method: "POST",
        headers,
        body: JSON.stringify({
            patientId: patientId.value,
            doctorId: doctorId.value,
            appointmentDate: appointmentDate.value,
            appointmentTime: appointmentTime.value,
            notes: notes.value
        })
    })
    .then(r => {
        if (!r.ok) throw new Error();
        location.reload();
    })
    .catch(() => alert("Validation failed"));
}

/* ================= CANCEL ================= */
function cancelAppointment(id) {

    if (!confirm("Cancel this appointment?")) return;

    fetch(`http://localhost:8080/api/appointments/${id}`, {
        method: "DELETE",
        headers: {
            "Authorization": "Bearer " + localStorage.getItem("token")
        }
    })
    .then(res => {
        if (!res.ok) throw new Error("Cancel failed");
        location.reload();
    })
    .catch(err => {
        alert("Unable to cancel appointment");
        console.error(err);
    });
}



/* ================= LOGOUT ================= */
function logout() {
    localStorage.clear();
    location.href = "index.html";
}
</script>
</body>
</html>
