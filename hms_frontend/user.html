<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HMS | User Management</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body { background:#f4f7fb; font-family: "Segoe UI", system-ui; }
        .sidebar { width:260px; min-height:100vh; background:linear-gradient(135deg,#0d6efd,#0a58ca); color:#fff; }
        .sidebar a { display:block; padding:12px 20px; color:#fff; text-decoration:none; }
        .sidebar a:hover { background:rgba(255,255,255,0.15); }
        .topbar { background:#fff; padding:15px 30px; border-bottom:1px solid #e3e6ea; }
        .content { padding:30px; }
    </style>
</head>

<body>
<div class="d-flex">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h4 class="p-3"><i class="bi bi-hospital"></i> HMS Admin</h4>
        <a href="admin-dashboard.html">Dashboard</a>
        <a href="user.html">User Management</a>
        <a href="patients.html">Patients</a>
        <a href="#" onclick="logout()" class="text-warning mt-4">Logout</a>
    </div>

    <!-- MAIN -->
    <div class="flex-grow-1">

        <div class="topbar d-flex justify-content-between">
            <h5>User Management</h5>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addUserModal">
                + Add User
            </button>
        </div>

        <div class="content">
            <table class="table table-bordered table-striped align-middle">
                <thead class="table-light">
                <tr>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th width="160">Actions</th>
                </tr>
                </thead>
                <tbody id="userTable"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- ADD USER MODAL -->
<div class="modal fade" id="addUserModal">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header"><h5>Add User</h5></div>
            <div class="modal-body">
                <input class="form-control mb-2" id="aUsername" placeholder="Username">
                <input class="form-control mb-2" id="aEmail" placeholder="Email">
                <input class="form-control mb-2" id="aPassword" placeholder="Password" type="password">
                <select class="form-select" id="aRole">
                    <option value="ROLE_DOCTOR">Doctor</option>
                    <option value="ROLE_RECEPTIONIST">Receptionist</option>
                    <option value="ROLE_ACCOUNTANT">Accountant</option>
                </select>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="addUser()">Create</button>
            </div>
        </div>
    </div>
</div>

<!-- EDIT USER MODAL -->
<div class="modal fade" id="editUserModal">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header"><h5>Edit User</h5></div>
            <div class="modal-body">
                <input type="hidden" id="eId">
                <input class="form-control mb-2" id="eEmail">
                <select class="form-select mb-2" id="eRole">
                    <option value="ROLE_DOCTOR">Doctor</option>
                    <option value="ROLE_RECEPTIONIST">Receptionist</option>
                    <option value="ROLE_ACCOUNTANT">Accountant</option>
                </select>
                <select class="form-select" id="eEnabled">
                    <option value="true">Active</option>
                    <option value="false">Disabled</option>
                </select>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="updateUser()">Save</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
const token = localStorage.getItem("token");
if (!token || localStorage.getItem("role") !== "ROLE_ADMIN") location.href = "index.html";

const headers = {
    "Content-Type": "application/json",
    "Authorization": "Bearer " + token
};

function loadUsers() {
    fetch("http://localhost:8080/api/users", { headers })
        .then(res => res.json())
        .then(data => {
            const tbody = document.getElementById("userTable");
            tbody.innerHTML = "";

            data.forEach(u => {
                const roleText = (u.role || "").replace("ROLE_", "");

                tbody.innerHTML += `
                <tr>
                    <td>${u.username}</td>
                    <td>${u.email || "-"}</td>
                    <td>${roleText}</td>
                    <td>
                        <span class="badge bg-${u.enabled ? "success" : "secondary"}">
                            ${u.enabled ? "Active" : "Disabled"}
                        </span>
                    </td>
                    <td>
                        <button class="btn btn-sm btn-warning"
                          onclick="openEdit(${u.id}, '${u.email || ""}', '${u.role}', ${u.enabled})">
                          Edit
                        </button>
                        <button class="btn btn-sm btn-danger"
                          onclick="disableUser(${u.id})">
                          Disable
                        </button>
                    </td>
                </tr>`;
            });
        })
        .catch(err => console.error("Load users failed", err));
}


function addUser() {
    fetch("http://localhost:8080/api/users", {
        method:"POST",
        headers,
        body:JSON.stringify({
            username:aUsername.value,
            email:aEmail.value,
            password:aPassword.value,
            role:aRole.value
        })
    }).then(() => location.reload());
}

function openEdit(id,email,role,enabled) {
    eId.value=id; eEmail.value=email; eRole.value=role; eEnabled.value=enabled;
    new bootstrap.Modal(editUserModal).show();
}

function updateUser() {
    fetch(`http://localhost:8080/api/users/${eId.value}`,{
        method:"PUT",
        headers,
        body:JSON.stringify({
            email:eEmail.value,
            role:eRole.value,
            enabled:eEnabled.value==="true"
        })
    }).then(() => location.reload());
}

function disableUser(id) {
    fetch(`http://localhost:8080/api/users/${id}`,{
        method:"PUT",
        headers,
        body:JSON.stringify({ enabled:false })
    }).then(() => loadUsers());
}

function logout() {
    localStorage.clear();
    location.href="index.html";
}

loadUsers();
</script>
</body>
</html>
