<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HMS | Receptionist Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body { background:#f4f7fb; font-family:"Segoe UI",system-ui; }
        .sidebar {
            width:260px; min-height:100vh;
            background:linear-gradient(135deg,#0d6efd,#0a58ca);
            color:white;
        }
        .sidebar a {
            display:block; padding:12px 20px;
            color:white; text-decoration:none;
        }
        .sidebar a:hover { background:rgba(255, 255, 255, 0.15); }
        .topbar {
            background:white; padding:15px 30px;
            border-bottom:1px solid #e3e6ea;
        }
        .content { padding:30px; }
    </style>
</head>

<body>
<div class="d-flex">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h4 class="p-3"><i class="bi bi-hospital"></i> Reception</h4>
        <a href="#" onclick="showSection('patients')">Patients</a>
        <a href="#" onclick="showSection('appointments')">Appointments</a>
        <a href="#" onclick="showSection('doctors')">Doctors</a>
        <a href="#" onclick="logout()" class="text-warning mt-4">Logout</a>
    </div>

    <!-- MAIN -->
    <div class="flex-grow-1">

        <div class="topbar">
            <h5 id="pageTitle">Patients</h5>
        </div>

        <div class="content">

            <!-- ================= PATIENTS ================= -->
            <div id="patientsSection">
                <button class="btn btn-success mb-3" data-bs-toggle="modal" data-bs-target="#patientModal">
                    + Add Patient
                </button>

                <table class="table table-bordered table-striped">
                    <thead>
                    <tr>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>Age</th>
                        <th>Gender</th>
                    </tr>
                    </thead>
                    <tbody id="patientTable"></tbody>
                </table>
            </div>

            <!-- ================= APPOINTMENTS ================= -->
            <div id="appointmentsSection" style="display:none;">
                <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#appointmentModal">
                    + Book Appointment
                </button>

                <table class="table table-bordered table-striped">
                    <thead>
                    <tr>
                        <th>Patient</th>
                        <th>Doctor</th>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Status</th>
                    </tr>
                    </thead>
                    <tbody id="appointmentTable"></tbody>
                </table>
            </div>

            <!-- ================= DOCTORS ================= -->
            <div id="doctorsSection" style="display:none;">
                <table class="table table-bordered table-striped">
                    <thead>
                    <tr>
                        <th>Name</th>
                        <th>Department</th>
                        <th>Specialization</th>
                    </tr>
                    </thead>
                    <tbody id="doctorTable"></tbody>
                </table>
            </div>

        </div>
    </div>
</div>

<!-- ================= PATIENT MODAL ================= -->
<div class="modal fade" id="patientModal">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header"><h5>Add Patient</h5></div>
            <div class="modal-body">
                <input class="form-control mb-2" id="pFirstName" placeholder="First Name">
                <input class="form-control mb-2" id="pLastName" placeholder="Last Name">
                <input class="form-control mb-2" id="pPhone" placeholder="Phone">
                <input class="form-control mb-2" id="pAge" type="number" placeholder="Age">
                <select class="form-select" id="pGender">
                    <option value="MALE">Male</option>
                    <option value="FEMALE">Female</option>
                </select>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="createPatient()">Save</button>
            </div>
        </div>
    </div>
</div>

<!-- ================= APPOINTMENT MODAL ================= -->
<div class="modal fade" id="appointmentModal">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header"><h5>Book Appointment</h5></div>
            <div class="modal-body">
                <select class="form-select mb-2" id="aPatient"></select>
                <select class="form-select mb-2" id="aDoctor"></select>
                <input type="date" class="form-control mb-2" id="aDate">
                <input type="time" class="form-control mb-2" id="aTime">
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="bookAppointment()">Book</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
/* ================= AUTH GUARD ================= */
const token = localStorage.getItem("token");
const role  = localStorage.getItem("role");

if (!token || role !== "ROLE_RECEPTIONIST") {
    localStorage.clear();
    location.href = "index.html";
}

const headers = {
    "Content-Type": "application/json",
    "Authorization": "Bearer " + token
};

/* ================= NAVIGATION ================= */
function showSection(section) {
    document.querySelectorAll(".section").forEach(s => s.style.display = "none");
    document.getElementById(section + "Section").style.display = "block";
    document.getElementById("pageTitle").innerText =
        section.charAt(0).toUpperCase() + section.slice(1);
}

/* ================= LOAD PATIENTS ================= */
function loadPatients() {
    fetch("http://localhost:8080/api/patients", { headers })
        .then(r => r.json())
        .then(data => {
            const table = document.getElementById("patientTable");
            const select = document.getElementById("aPatient");
            table.innerHTML = "";
            select.innerHTML = "";

            data.forEach(p => {
                table.innerHTML += `
                    <tr>
                        <td>${p.firstName} ${p.lastName}</td>
                        <td>${p.phone}</td>
                        <td>${p.gender}</td>
                        <td>${p.age ?? "-"}</td>
                    </tr>
                `;
                select.innerHTML += `
                    <option value="${p.id}">
                        ${p.firstName} ${p.lastName}
                    </option>
                `;
            });
        })
        .catch(() => alert("Failed to load patients"));
}

/* ================= LOAD DOCTORS ================= */
function loadDoctors() {
    fetch("http://localhost:8080/api/doctors", { headers })
        .then(r => r.json())
        .then(data => {
            const table = document.getElementById("doctorTable");
            const select = document.getElementById("aDoctor");
            table.innerHTML = "";
            select.innerHTML = "";

            data.forEach(d => {
                table.innerHTML += `
                    <tr>
                        <td>${d.firstName} ${d.lastName}</td>
                        <td>${d.departmentName}</td>
                        <td>${d.specialization ?? "-"}</td>
                    </tr>
                `;
                select.innerHTML += `
                    <option value="${d.id}">
                        ${d.firstName} ${d.lastName}
                    </option>
                `;
            });
        })
        .catch(() => alert("Failed to load doctors"));
}

/* ================= LOAD APPOINTMENTS ================= */
function loadAppointments() {
    fetch("http://localhost:8080/api/appointments", { headers })
        .then(r => r.json())
        .then(data => {
            const table = document.getElementById("appointmentTable");
            table.innerHTML = "";

            data.forEach(a => {
                table.innerHTML += `
                    <tr>
                        <td>${a.patientName}</td>
                        <td>${a.doctorName}</td>
                        <td>${a.appointmentDate}</td>
                        <td>${a.appointmentTime}</td>
                        <td>
                            <span class="badge bg-${a.status === "BOOKED" ? "primary" : "secondary"}">
                                ${a.status}
                            </span>
                        </td>
                    </tr>
                `;
            });
        })
        .catch(() => alert("Failed to load appointments"));
}

/* ================= CREATE PATIENT ================= */
function createPatient() {
    fetch("http://localhost:8080/api/patients", {
        method: "POST",
        headers,
        body: JSON.stringify({
            firstName: pFirstName.value,
            lastName: pLastName.value,
            phone: pPhone.value,
            gender: pGender.value,
            age: pAge.value
        })
    })
    .then(r => {
        if (!r.ok) throw new Error();
        location.reload();
    })
    .catch(() => alert("Patient creation failed"));
}

/* ================= BOOK APPOINTMENT ================= */
function bookAppointment() {
    fetch("http://localhost:8080/api/appointments", {
        method: "POST",
        headers,
        body: JSON.stringify({
            patientId: aPatient.value,
            doctorId: aDoctor.value,
            appointmentDate: aDate.value,
            appointmentTime: aTime.value
        })
    })
    .then(r => {
        if (!r.ok) throw new Error();
        location.reload();
    })
    .catch(() => alert("Appointment booking failed"));
}

/* ================= LOGOUT ================= */
function logout() {
    localStorage.clear();
    location.href = "index.html";
}

/* ================= INIT ================= */
showSection("patients");
loadPatients();
loadDoctors();
loadAppointments();
</script>
</body>
</html>
